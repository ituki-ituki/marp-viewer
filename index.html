<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marp Viewer</title>
  <link rel="icon" href="template/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <img src="template/favicon.png" alt="Marp Viewer" class="logo" style="height: 2em; vertical-align: middle;">
      <h1 style="display: inline-block; vertical-align: middle; line-height: 2em; margin: 0 0 0 0.5em;">Marp Viewer</h1>
    </div>
    <div class="toolbar">
      <select id="editorMode" aria-label="Markdown または CSS">
        <option value="md">Markdown</option>
        <option value="css">CSS</option>
      </select>
      <span class="spacer"></span>
      <button id="pdfBtn" type="button">PDF出力</button>
    </div>
  </header>

  <main>
    <div class="editor-pane" id="editorPane">
      <textarea id="editor" spellcheck="false" placeholder="PNG / JPEG をドロップすると画像を挿入"></textarea>
    </div>
    <div id="preview"></div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
